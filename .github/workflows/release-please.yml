name: Release Please

# On every merge to main, release-please maintains a release PR that
# accumulates a CHANGELOG from conventional commits and bumps the version in
# Cargo.toml. Merging that PR tags and publishes the release; the jobs below
# then attach the platform binaries and rewrite the release body with
# PR-based notes (one line per merged PR — the "why" lives in PRs, while the
# commit-level "what" stays in CHANGELOG.md).
#
# The binaries are built via workflow_call (not the tag-push trigger in
# release.yml) because refs created with the workflow's GITHUB_TOKEN do not
# fire other workflows.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: rust

  build-binaries:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      contents: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}

  pr-based-notes:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Replace release body with PR-based notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        # generate-notes lists merged PRs (titles, links, authors) between the
        # previous release and this tag — the "why" — instead of the raw
        # commit list release-please writes. CHANGELOG.md keeps the
        # commit-level detail in the repo.
        run: |
          body=$(gh api -X POST "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" --jq .body)
          gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes "$body"
