name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build/publish (e.g. v0.1.0)"
        required: true
  # Called by release-please.yml after it cuts a release — tags created with
  # GITHUB_TOKEN do not fire the `push: tags` trigger above.
  workflow_call:
    inputs:
      tag:
        description: "Tag to build/publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Both macOS slices build on Apple Silicon — the macOS toolchain
          # cross-compiles to x86_64 natively, avoiding the deprecated/queue-
          # constrained Intel `macos-13` runners.
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-14
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
        with:
          # Build the tagged commit, not whatever branch triggered us.
          ref: ${{ inputs.tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage binary
        run: |
          install -m 0755 "target/${{ matrix.target }}/release/memd" "memd-${{ matrix.target }}"
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: memd-${{ matrix.target }}
          # Release notes are owned by release-please (CHANGELOG-based);
          # regenerating them here would clobber that body.
